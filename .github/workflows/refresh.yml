name: Refresh New Sounds Feed

on:
  schedule:
    # Runs every day at 6 AM UTC (2 AM Eastern)
    - cron: "0 6 * * *"
  # Also lets you trigger it manually from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate feed
        run: python generate_feed.py

      - name: Commit and push if feed was created or updated
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage only if the files exist (first run may skip if site is down)
          git add feed.xml episode_cache.json 2>/dev/null || true
          # Only commit if there are staged changes
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update feed $(date -u +'%Y-%m-%d')"
            git push
          fi
